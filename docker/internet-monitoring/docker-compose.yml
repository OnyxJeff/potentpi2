services:

  prometheus:
    image: prom/prometheus:latest
    container_name: internet-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - $HOME/pp2-mimir/docker/internet-monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - $HOME/pp2-mimir/docker/internet-monitoring/data/prometheus:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=10GB"
      - "--storage.tsdb.wal-compression"

  grafana:
    image: grafana/grafana-oss:latest
    container_name: internet-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - $HOME/pp2-mimir/docker/internet-monitoring/grafana/config.monitoring
    volumes:
      - $HOME/pp2-mimir/docker/internet-monitoring/data/grafana:/var/lib/grafana
      - $HOME/pp2-mimir/docker/internet-monitoring/grafana/provisioning:/etc/grafana/provisioning

  node-exporter:
    image: prom/node-exporter:latest
    container_name: internet-node-exporter
    restart: unless-stopped
    pid: host
    ports:
      - "9100:9100"
    volumes:
      - /:/host:ro,rslave
    command:
      - '--path.rootfs=/host'

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: internet-cadvisor
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro

  speedtest-exporter:
    image: ghcr.io/miguelndecarvalho/speedtest-exporter:latest
    container_name: internet-speedtest-exporter
    restart: unless-stopped
    environment:
      - SPEEDTEST_SERVER=68386
      - SPEEDTEST_INTERVAL=3600
    ports:
      - "9798:9798"

  graphite:
    image: graphiteapp/graphite-statsd:latest
    container_name: internet-graphite
    restart: unless-stopped
    ports:
      - "8082:80"       # Graphite Web UI
      - "2003-2004:2003-2004"  # Carbon TCP
      - "2023-2024:2023-2024"  # Carbon UDP
      - "8125:8125/udp"  # StatsD UDP
      - "8126:8126"      # StatsD Admin
    volumes:
      - $HOME/pp2-mimir/docker/internet-monitoring/data/graphite:/opt/graphite/storage

  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    container_name: blackbox-exporter
    restart: unless-stopped
    ports:
      - "9115:9115"
    volumes:
      - $HOME/pp2-mimir/docker/internet-monitoring/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    command:
      - '--config.file=/etc/blackbox_exporter/config.yml'
      - '--log.level=info'

networks:
  default:
    name: internet-monitoring