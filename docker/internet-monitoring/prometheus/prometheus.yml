# my global config
global:
  scrape_interval:     15s # By default, scrape targets every 15 seconds.
  evaluation_interval: 15s # By default, scrape targets every 15 seconds.
  # scrape_timeout is set to the global default (10s).

  # Attach these labels to any time series or alerts when communicating with
  # external systems (federation, remote storage, Alertmanager).
  external_labels:
      monitor: 'Alertmanager'

# Load and evaluate rules in this file every 'evaluation_interval' seconds.
rule_files:
    - 'alert.rules'
  # - "first.rules"
  # - "second.rules"

# A scrape configuration containing exactly one endpoint to scrape:
# Here it's Prometheus itself.
scrape_configs:

  - job_name: 'prometheus-router'
    static_configs:
      - targets: ['10.100.0.1:9100']

  - job_name: 'homeassistant'
    basic_auth:
      username: admin
      password: admin
    static_configs:
      - targets: ['svr-frigg.jotunheim.onyxnet.lan:9100']

  - job_name: 'prometheus-pp2-mimir'
    scrape_interval: 5s # Override the global default and scrape targets from this job every 5 seconds.
    static_configs:
      - targets: ['svr-mimir.asgard.onyxnet.lan:9090']

  - job_name: 'TrueNAS-Muninn'
    static_configs:
      - targets: ['svr-mimir.asgard.onyxnet.lan:9108']

  - job_name: 'pihole'
    static_configs:
      - targets: ['svr-odin.asgard.onyxnet.lan:9617']

  - job_name: 'speedtest'
    metrics_path: /metrics
    scrape_interval: 15m
    scrape_timeout: 60s # running speedtest needs time to complete
    static_configs:
      - targets: ['svr-mimir.asgard.onyxnet.lan:9798']

  - job_name: 'ping'
    metrics_path: /probe
    scrape_interval: 5s
    params:
      module: [http_2xx]  # Look for a HTTP 200 response.
    file_sd_configs:
      - files:
        - pinghosts.yaml
    relabel_configs:
      - source_labels: [__address__]
        regex: '(.*);(.*);(.*);(.*)'  #first is the url, thus unique for instance
        target_label: instance
        replacement: $1
      - source_labels: [__address__]
        regex: '(.*);(.*);(.*);(.*)'  #second is humanname to use in charts
        target_label: humanname
        replacement: $2
      - source_labels: [__address__]
        regex: '(.*);(.*);(.*);(.*)'  #third state whether this is testing external or internal network
        target_label: routing
        replacement: $3
      - source_labels: [__address__]
        regex: '(.*);(.*);(.*);(.*)'  #fourth is which switch/router the device is connected to.
        target_label: switching
        replacement: $4
      - source_labels: [instance]
        target_label: __param_target
      - target_label: __address__
        replacement: 10.100.0.12:9115  # The blackbox exporter's real hostname:port.

  - job_name: 'nodeexp'
    static_configs:
    - targets: ['svr-mimir.asgard.onyxnet.lan:9100']

  - job_name: 'pve-aesir1'
    metrics_path: /pve
    params:
      module: [default]
      cluster: ['1']
      node: ['1']
    static_configs:
      - targets: ['svr-aesir1.asgard.onyxnet.lan:9221']

  - job_name: 'pve-aesir2'
    metrics_path: /pve
    params:
      module: [default]
      cluster: ['1']
      node: ['1']
    static_configs:
      - targets: ['svr-aesir2.asgard.onyxnet.lan:9221']

  - job_name: 'pve-aesir3'
    metrics_path: /pve
    params:
      module: [default]
      cluster: ['1']
      node: ['1']
    static_configs:
      - targets: ['svr-aesir3.asgard.onyxnet.lan:9221']

  - job_name: 'pve-vanir1'
    metrics_path: /pve
    params:
      module: [default]
      cluster: ['1']
      node: ['1']
    static_configs:
      - targets: ['svr-vanir1.asgard.onyxnet.lan:9221']
