# my global config
global:
  scrape_interval:     15s # By default, scrape targets every 15 seconds.
  evaluation_interval: 15s # By default, scrape targets every 15 seconds.
  # scrape_timeout is set to the global default (10s).

# A scrape configuration containing exactly one endpoint to scrape:
# Here it's Prometheus itself.
scrape_configs:

  - job_name: 'prometheus'
    static_configs:
      - targets:
        - 'prometheus:9090'
  
  - job_name: 'cadvisor'
    static_configs:
      - targets:
          - 'cadvisor:8080'
  
  - job_name: 'speedtest'
    metrics_path: /metrics
    scrape_interval: 15m
    scrape_timeout: 60s
    static_configs:
      - targets:
        - 'speedtest-exporter:9798'

  - job_name: 'prometheus-router'
    static_configs:
      - targets:
        - '10.100.0.1:9100'

  - job_name: 'homeassistant'
    basic_auth:
      username: admin
      password: admin
    static_configs:
      - targets:
        - 'svr-frigg.jotunheim.onyxnet.lan:9100'

  - job_name: 'prometheus-pp2-mimir'
    scrape_interval: 5s # Override the global default and scrape targets from this job every 5 seconds.
    static_configs:
      - targets:
        - 'svr-mimir.asgard.onyxnet.lan:9090'

  - job_name: 'TrueNAS-Muninn'
    static_configs:
      - targets:
        - 'svr-mimir.asgard.onyxnet.lan:9108'

  - job_name: 'pihole'
    static_configs:
      - targets:
        - 'svr-odin.asgard.onyxnet.lan:9617'

  - job_name: 'nodeexp'
    static_configs:
      - targets:
        - 'node-exporter:9100'

  - job_name: 'pve-aesir'
    metrics_path: /pve
    params:
      module: [default]
      cluster: ['1']
      node: ['1']
    static_configs:
      - targets:
        - 'svr-aesir1.asgard.onyxnet.lan:9221'
        - 'svr-aesir2.asgard.onyxnet.lan:9221'
        - 'svr-aesir3.asgard.onyxnet.lan:9221'

  - job_name: 'pve-vanir'
    metrics_path: /pve
    params:
      module: [default]
      cluster: ['1']
      node: ['1']
    static_configs:
      - targets:
        - 'svr-vanir1.asgard.onyxnet.lan:9221'
        - 'svr-vanir2.asgard.onyxnet.lan:9221'
        - 'svr-vanir3.asgard.onyxnet.lan:9221'
